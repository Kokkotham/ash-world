<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灰烬世界 — Ash World</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
        }
    }
    </script>
    <style>
        :root {
            --ash-dark: #030508;
            --ash-gray: #080c10;
            --ash-medium: #101820;
            --ash-light: #2a3a42;
            --ash-text: #a8b8bc;
            --ash-gold: #c9a84c;
            --ash-gold-dim: #8a7340;
            --ash-ember: #5c1a1a;
            --ash-ember-glow: #3a1010;
            --ash-copper: #8a6030;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--ash-dark);
            color: var(--ash-text);
            overflow-x: hidden;
            min-height: 100vh;
        }
        /* 暗角层 */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%);
        }
        /* 底部余烬光晕 */
        .ember-glow {
            position: fixed; bottom: -40%; left: 50%; transform: translateX(-50%);
            width: 120vw; height: 80vh; z-index: 1; pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(92,26,26,0.12) 0%, transparent 70%);
            filter: blur(60px);
        }
        /* 噪点纹理 */
        .noise-overlay {
            position: fixed; inset: 0; z-index: 3; pointer-events: none; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }
        .bg-particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.1;
        }
        .particle {
            position: absolute; width: 2px; height: 2px;
            background: #4a9aaa; border-radius: 50%;
            animation: float-up linear infinite;
        }
        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; } 90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .header {
            position: relative; z-index: 10;
            text-align: center; padding: 32px 20px 12px;
            transition: opacity 0.5s;
        }
        .header h1 {
            font-family: 'Cinzel', serif; font-size: 3.2rem; font-weight: 900;
            color: var(--ash-gold);
            text-shadow:
                0 0 30px rgba(184,146,58,0.18),
                0 0 60px rgba(184,146,58,0.08),
                0 4px 20px rgba(0,0,0,0.8);
            letter-spacing: 0.35em; margin-bottom: 8px;
            position: relative;
        }
        /* 标题下方微弱余烬反光 */
        .header h1::after {
            content: attr(data-text);
            position: absolute; left: 0; right: 0; top: 6px;
            color: transparent;
            background: linear-gradient(180deg, rgba(92,26,26,0.25), transparent 70%);
            -webkit-background-clip: text; background-clip: text;
            filter: blur(3px);
            z-index: -1; pointer-events: none;
        }
        .header .subtitle {
            font-size: 0.8rem; color: var(--ash-dim);
            letter-spacing: 0.6em;
            text-transform: uppercase;
        }
        .header .divider {
            width: 180px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--ash-gold-dim), var(--ash-gold), var(--ash-gold-dim), transparent);
            margin: 16px auto; opacity: 0.6;
        }
        /* 装饰性角花 */
        .header .ornament {
            font-size: 0.9rem; color: var(--ash-gold-dim);
            letter-spacing: 0.3em; opacity: 0.35;
            margin-top: 4px;
        }
        .header .intro {
            color: var(--ash-dim); font-size: 0.85rem;
            max-width: 480px; margin: 0 auto; line-height: 2.0;
            letter-spacing: 0.08em;
        }

        .main-container {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none;
        }
        .dice-wrap {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none;
        }
        #dice-canvas {
            position: absolute; inset: 0;
            width: 100%; height: 100%; display: block;
            cursor: grab; border-radius: 0;
            transition: opacity 0.4s;
            pointer-events: auto;
        }
        #dice-canvas:active { cursor: grabbing; }
        #dice-loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: var(--ash-gold-dim); font-size: 0.8rem; letter-spacing: 0.15em;
            pointer-events: none; z-index: 5;
        }


        .face-info {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 20; opacity: 0;
            transition: opacity 0.4s; pointer-events: none;
        }
        .face-info.visible { opacity: 1; }
        .face-info .face-name {
            font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--ash-gold);
            letter-spacing: 0.22em; margin-bottom: 6px;
            text-shadow: 0 0 16px rgba(184,146,58,0.2);
        }
        .face-info .face-desc { font-size: 0.76rem; color: var(--ash-dim); margin-bottom: 10px; letter-spacing: 0.06em; }
        .face-info .enter-btn {
            display: inline-block; padding: 8px 26px;
            background: rgba(184,146,58,0.04); border: 1px solid rgba(184,146,58,0.35);
            color: var(--ash-gold); font-family: 'Noto Serif SC', serif;
            font-size: 0.8rem; letter-spacing: 0.14em;
            text-decoration: none; transition: all 0.35s;
            cursor: pointer; pointer-events: auto;
            vertical-align: middle;
            position: relative; overflow: hidden;
        }
        .face-info .enter-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(184,146,58,0.15), transparent);
            transform: translateX(-100%); transition: transform 0.5s;
        }
        .face-info .enter-btn:hover {
            background: rgba(184,146,58,0.12);
            border-color: var(--ash-gold);
            color: #e0c060;
            box-shadow: 0 0 20px rgba(184,146,58,0.15);
        }
        .face-info .enter-btn:hover::before { transform: translateX(100%); }

        /* 顶部导航栏 */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: flex-start;
            padding: 0 36px; height: 62px; gap: 52px;
            background: linear-gradient(180deg, #0e1116 0%, #090c10 100%);
            border-bottom: 1px solid rgba(201,168,76,0.25);
            box-shadow: 0 1px 0 rgba(0,0,0,0.6), 0 8px 24px rgba(0,0,0,0.3);
            transition: opacity 0.5s;
        }
        .top-nav::after {
            content: '';
            position: absolute; bottom: -2px; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.12) 20%, rgba(201,168,76,0.18) 50%, rgba(201,168,76,0.12) 80%, transparent 100%);
            z-index: 0; pointer-events: none;
        }
        .top-nav .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Cinzel', serif; font-size: 1.6rem; font-weight: 700;
            color: var(--ash-gold); letter-spacing: 0.14em;
            opacity: 0.92; transition: opacity 0.2s, text-shadow 0.2s;
        }
        .top-nav .nav-brand:hover {
            opacity: 1;
            text-shadow: 0 0 16px rgba(201,168,76,0.2);
        }
        .top-nav .nav-links {
            display: flex; align-items: center; gap: 0;
            height: 100%;
        }
        .top-nav .nav-item {
            position: relative;
            height: 100%; display: flex; align-items: center;
        }
        .top-nav .nav-item + .nav-item::before {
            content: '';
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 1px; height: 16px;
            background: rgba(201,168,76,0.08);
            pointer-events: none;
        }
        .top-nav .nav-item > a,
        .top-nav .nav-item > span {
            display: flex; align-items: center; height: 100%;
            color: #b8bfc4; font-size: 0.98rem; font-weight: 400;
            text-decoration: none; padding: 0 20px;
            transition: color 0.2s, background 0.2s;
            letter-spacing: 0.06em;
            white-space: nowrap; cursor: pointer;
            position: relative; z-index: 1;
            border-bottom: 2px solid transparent; margin-bottom: 0;
        }
        .top-nav .nav-item:hover > a,
        .top-nav .nav-item:hover > span {
            color: #e0cc80;
            background: linear-gradient(180deg, rgba(201,168,76,0.04) 0%, transparent 100%);
            border-bottom-color: rgba(201,168,76,0.45);
        }
        /* 登录按钮 / 用户状态 */
        #loginBtn {
            color: var(--ash-gold) !important;
            font-size: 0.88rem;
            letter-spacing: 0.08em;
            padding: 4px 14px !important;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 20px;
            transition: all 0.25s ease;
        }
        #loginBtn:hover {
            color: #fff !important;
            background: rgba(201,168,76,0.15);
            border-color: var(--ash-gold);
            box-shadow: 0 0 12px rgba(201,168,76,0.2);
        }
        #loginBtn.logged-in {
            border-color: rgba(92,180,140,0.35);
            color: #8cd4b8 !important;
        }
        /* hover 桥接 — 填充触发项与下拉间的空隙，防止 hover 断连 */
        .top-nav .nav-item::after {
            content: '';
            position: absolute;
            top: 100%; left: 0; right: 0; height: 10px;
            pointer-events: auto;
            z-index: 102;
        }
        /* 局部下拉面板 — 导航栏一体化下沉设计 */
        .top-nav .nav-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-4px);
            min-width: 160px;
            padding: 0;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease-out, transform 0.2s ease-out;
            z-index: 101;
            display: flex; flex-direction: column;
            background: linear-gradient(180deg, rgba(8,10,16,0.98) 0%, rgba(12,15,22,0.96) 100%);
            border: none;
            border-top: 1px solid rgba(201,168,76,0.35);
            border-radius: 0;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.5),
                0 2px 8px rgba(0,0,0,0.3);
        }
        .top-nav .nav-dropdown::before { display: none; }
        .top-nav .nav-dropdown::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% -20%, rgba(201,168,76,0.05), transparent 70%);
            pointer-events: none;
        }
        .top-nav .nav-item:hover .nav-dropdown {
            opacity: 1; pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .top-nav .nav-dropdown a {
            color: #9a9070;
            font-size: 0.88rem;
            font-weight: 400;
            text-decoration: none;
            padding: 10px 24px;
            transition: color 0.2s, background 0.2s, border-left-color 0.2s;
            letter-spacing: 0.08em;
            white-space: nowrap;
            position: relative;
            border-left: 2px solid transparent;
        }
        .top-nav .nav-dropdown a::before { display: none; }
        .top-nav .nav-dropdown a:hover {
            color: var(--ash-gold);
            background: rgba(201,168,76,0.06);
            border-left-color: var(--ash-gold);
        }
        .top-nav .nav-dropdown a:hover::before { width: 0; } /* 覆盖旧规则 */
        .top-nav .nav-dropdown a:first-child { padding-top: 14px; }
        .top-nav .nav-dropdown a:last-child { padding-bottom: 14px; }
        .nav-dropdown a.active {
            color: var(--ash-gold);
            font-weight: 500;
            border-left-color: var(--ash-gold);
            background: rgba(201,168,76,0.08);
        }
        @media (max-width: 900px) {
            .top-nav { padding: 0 16px; }
            .top-nav .nav-links { display: none; }
        }

        .footer {
            position: relative; z-index: 10;
            text-align: center; padding: 24px 20px;
            color: var(--ash-dim); font-size: 0.75rem;
            transition: opacity 0.4s;
            opacity: 0.6;
        }
        .footer .divider {
            width: 100px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--ash-gold-dim), transparent);
            margin: 0 auto 12px; opacity: 0.4;
        }

        /* 粒子开关按钮 — 在拖尾按钮上方 */
        .particle-toggle {
            position: fixed; bottom: 32px; right: 20px;
            z-index: 30; pointer-events: auto;
            background: rgba(3, 5, 8, 0.65);
            border: 1px solid rgba(184, 146, 58, 0.25);
            color: var(--ash-gold-dim);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.7rem; letter-spacing: 0.1em;
            padding: 6px 14px; border-radius: 2px;
            cursor: pointer; transition: all 0.3s;
            backdrop-filter: blur(4px);
        }
        .particle-toggle:hover {
            border-color: rgba(184,146,58,0.55);
            color: var(--ash-gold);
        }
        .particle-toggle.off {
            border-color: rgba(60, 60, 60, 0.3);
            color: rgba(100, 100, 100, 0.5);
        }

        /* 鼠标火光拖尾开关按钮 */
        .trail-toggle {
            position: fixed; bottom: 2px; right: 20px;
            z-index: 10000; pointer-events: auto;
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px;
            background: rgba(3, 5, 8, 0.65);
            border: 1px solid rgba(184, 146, 58, 0.25);
            border-radius: 2px;
            color: var(--ash-gold-dim);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.7rem; letter-spacing: 0.1em;
            cursor: pointer; transition: all 0.3s;
            backdrop-filter: blur(4px);
            user-select: none;
        }
        .trail-toggle:hover {
            border-color: rgba(184, 146, 58, 0.55);
            color: var(--ash-gold);
        }
        .trail-toggle.off {
            border-color: rgba(60, 60, 60, 0.3);
            color: rgba(100, 100, 100, 0.5);
        }
        .trail-toggle .trail-icon {
            font-size: 0.85rem; line-height: 1; transition: opacity 0.3s;
        }
        .trail-toggle.off .trail-icon { opacity: 0.4; }
        .trail-toggle .trail-label { font-size: 0.68rem; }
        @media (max-width: 768px) {
            .trail-toggle { bottom: 2px; right: 12px; padding: 8px 12px; font-size: 0.68rem; }
        }

        /* 鼠标拖尾画布 */
        #cursor-trail {
            position: fixed; inset: 0; z-index: 4;
            pointer-events: none;
        }

        /* 全屏过渡层 — 纯黑，与背景完全融合，不制造任何中间可视画面 */
        .page-transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #030508;
            opacity: 0; pointer-events: none; z-index: 999;
            transition: opacity 0.12s linear;
            display: flex; align-items: center; justify-content: center;
        }
        .page-transition-overlay.active {
            opacity: 1; pointer-events: auto;
        }
        .page-transition-overlay .transition-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            color: var(--ash-gold);
            letter-spacing: 0.2em;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .page-transition-overlay.active .transition-text {
            opacity: 1;
        }

        /* 汉堡菜单 */
        .nav-toggle { display: none; width: 32px; height: 32px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 102; flex-direction: column; justify-content: center; gap: 5px; }
        .nav-toggle span { display: block; width: 24px; height: 2px; background: var(--ash-gold); transition: all 0.3s; }
        .nav-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .nav-toggle.open span:nth-child(2) { opacity: 0; }
        .nav-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
        .nav-mobile { display: none; position: fixed; top: 62px; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, #0e1116 0%, #080c10 100%); z-index: 200; overflow-y: auto; padding: 20px 24px 40px; }
        .nav-mobile.open { display: block; }
        .nav-mobile .mobile-group { margin-bottom: 24px; }
        .nav-mobile .mobile-group-title { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--ash-gold); letter-spacing: 0.12em; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid rgba(201,168,76,0.2); }
        .nav-mobile .mobile-link { display: block; padding: 12px 16px; color: #b8bfc4; font-size: 0.95rem; text-decoration: none; letter-spacing: 0.05em; transition: color 0.2s, background 0.2s; border-left: 2px solid transparent; }
        .nav-mobile .mobile-link:hover, .nav-mobile .mobile-link.active { color: var(--ash-gold); border-left-color: var(--ash-gold); background: rgba(201,168,76,0.05); }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.9rem; letter-spacing: 0.22em; }
            .header .ornament { font-size: 0.7rem; }
            .face-info { bottom: 80px; }
            .face-info .enter-btn { padding: 7px 18px; font-size: 0.75rem; }
            .nav-links { display: none; }
            .nav-toggle { display: flex; }
            .top-nav { justify-content: space-between; }
            /* 移动端禁用鼠标拖尾（触屏无意义，节省性能） */
            #cursor-trail { display: none; }
            /* 粒子开关按钮在拖尾按钮上方 */
            .particle-toggle { bottom: 36px; right: 12px; padding: 8px 12px; font-size: 0.68rem; }
        }
        @media (max-width: 480px) {
            .header h1 { font-size: 1.55rem; letter-spacing: 0.16em; }
            .face-info { bottom: 60px; }
            .face-info .enter-btn { padding: 9px 20px; font-size: 0.78rem; min-height: 44px; } /* 触控目标 */
            .nav-mobile { padding: 14px 18px 32px; }
            .nav-mobile .mobile-link { padding: 14px 14px; font-size: 0.92rem; }
        }

        /* ========== 手机号登录弹窗 ========== */
        .login-overlay {
            position: fixed; inset: 0; z-index: 500;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .login-overlay.show { opacity: 1; pointer-events: auto; }
        .login-backdrop {
            position: absolute; inset: 0;
            background: rgba(3,5,8,0.82);
            backdrop-filter: blur(4px);
        }
        .login-card {
            position: relative; z-index: 1;
            width: 360px; max-width: 92vw;
            background: linear-gradient(180deg, rgba(12,16,24,0.97) 0%, rgba(8,10,16,0.98) 100%);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 4px;
            padding: 36px 32px 28px;
            box-shadow:
                0 0 40px rgba(0,0,0,0.5),
                0 0 80px rgba(201,168,76,0.06);
        }
        .login-card .login-close {
            position: absolute; top: 12px; right: 16px;
            background: none; border: none;
            color: var(--ash-dim); font-size: 1.5rem; cursor: pointer;
            line-height: 1; padding: 4px;
            transition: color 0.2s;
        }
        .login-card .login-close:hover { color: var(--ash-gold); }
        .login-card .login-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem; color: var(--ash-gold);
            letter-spacing: 0.12em; text-align: center;
            margin-bottom: 28px;
        }
        .login-card .login-label {
            display: block; color: var(--ash-dim);
            font-size: 0.75rem; letter-spacing: 0.08em;
            margin-bottom: 6px; margin-top: 14px;
        }
        .login-card .phone-input-row {
            display: flex; align-items: center;
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 2px;
            background: rgba(0,0,0,0.3);
        }
        .login-card .phone-input-row:focus-within {
            border-color: rgba(201,168,76,0.5);
        }
        .login-card .phone-prefix {
            padding: 10px 12px;
            color: var(--ash-gold-dim);
            font-size: 0.85rem;
            border-right: 1px solid rgba(201,168,76,0.15);
        }
        .login-card .phone-input-row input,
        .login-card input[type="text"],
        .login-card input[type="tel"] {
            flex: 1; min-width: 0;
            background: transparent; border: none;
            color: var(--ash-text); font-size: 0.95rem;
            padding: 10px 14px;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.06em;
            outline: none;
        }
        .login-card .send-code-btn {
            display: block; width: 100%; margin-top: 12px;
            padding: 10px; border-radius: 2px;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.25);
            color: var(--ash-gold);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.85rem; letter-spacing: 0.08em;
            cursor: pointer; transition: all 0.2s;
        }
        .login-card .send-code-btn:hover {
            background: rgba(201,168,76,0.16);
            border-color: var(--ash-gold);
        }
        .login-card .send-code-btn:disabled {
            opacity: 0.45; cursor: not-allowed; pointer-events: none;
        }
        .login-card .confirm-login-btn {
            display: block; width: 100%; margin-top: 20px;
            padding: 12px; border-radius: 2px;

    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ==================== 数据 ====================
    const FACES = [
        { name: '最新资讯', desc: '探索灰烬世界的最新动态',   href: 'pages/news.html' },
        { name: '世界观',   desc: '了解终焉之火与余烬纪元',   href: 'pages/worldview.html' },
        { name: '地图',     desc: '浏览这片被遗忘的大地',     href: 'pages/map.html' },
        { name: '种族',     desc: '认识灰烬中的各个族群',     href: 'pages/races.html' },
        { name: '游戏规则', desc: '掌握命运的法则',           href: 'pages/rules.html' },
        { name: '模组',     desc: '开启你的冒险旅程',         href: 'pages/modules.html' },
        { name: '衍生作品', desc: '小说、漫画与艺术',         href: 'pages/works.html' },
        { name: '周边产品', desc: '将灰烬世界带回家',         href: 'pages/merch.html' }
    ];

    // 八面体邻接关系（共享棱边）
    const ADJACENCY = [
        [1, 3, 4], [0, 2, 5], [1, 3, 6], [0, 2, 7],
        [0, 5, 7], [1, 4, 6], [2, 5, 7], [3, 4, 6]
    ];

    function bfsOrder(start) {
        const visited = new Set([start]);
        const order = [start];
        const queue = [start];
        while (queue.length) {
            const curr = queue.shift();
            for (const n of ADJACENCY[curr]) {
                if (!visited.has(n)) { visited.add(n); order.push(n); queue.push(n); }
            }
        }
        return order;
    }

    // ==================== DOM ====================
    const canvas = document.getElementById('dice-canvas');
    const loadingEl = document.getElementById('dice-loading');
    const wrap = document.getElementById('dice-wrap');
    const overlay = document.getElementById('transition-overlay');

    // ==================== 场景 ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010101); // 极暗背景，像炭火余烬

    const W = window.innerWidth;
    const H = window.innerHeight;

    const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
    camera.position.set(0, 0, 10.5);
    const ORIGIN_CAM_POS = camera.position.clone();
    const ORIGIN_CAM_QUAT = camera.quaternion.clone();

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.outputEncoding = THREE.sRGBEncoding;

    // ==================== 后处理 Bloom ====================
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(W * renderer.getPixelRatio(), H * renderer.getPixelRatio()),
        0.45,  // strength — 极低，只让高亮文字产生 bloom
        0.25,  // radius
        0.72   // threshold — 高阈值，过滤掉玻璃本体，只 bloom 鎏金高亮
    );
    composer.addPass(bloomPass);
    const BASE_BLOOM_STRENGTH = 0.38;

    // ==================== 光照 — 压低整体亮度，强化暗部神秘感 ====================
    scene.add(new THREE.AmbientLight(0x1a0e05, 0.08)); // 暖暗环境光，余烬感
    const mainLight = new THREE.DirectionalLight(0xa8b8c0, 0.5);
    mainLight.position.set(3, 5, 5); scene.add(mainLight);
    const fillLight = new THREE.DirectionalLight(0x3a1a08, 0.12); // 暖棕补光
    fillLight.position.set(-5, 1, -3); scene.add(fillLight);
    const rimLight = new THREE.DirectionalLight(0xb8923a, 0.18);
    rimLight.position.set(-2, -3, 4); scene.add(rimLight);
    const botLight = new THREE.PointLight(0x1a4050, 0.3, 25);
    botLight.position.set(0, -4, 3); scene.add(botLight);
    const topLight = new THREE.PointLight(0x405060, 0.06, 20);
    topLight.position.set(0, 5, 0); scene.add(topLight);
    // 底部暗红余烬微光
    const emberLight = new THREE.PointLight(0xcc5500, 0.25, 20); // 橙红余烬暖光
    emberLight.position.set(0, -6, 2); scene.add(emberLight);

    // ==================== 八面体 ====================
    const R = 2.4;
    function buildOcta(r) {
        const verts = [
            new THREE.Vector3(0, r, 0), new THREE.Vector3(0, -r, 0),
            new THREE.Vector3(r, 0, 0), new THREE.Vector3(-r, 0, 0),
            new THREE.Vector3(0, 0, r), new THREE.Vector3(0, 0, -r),
        ];
        const triIdx = [
            [0, 4, 2], [0, 2, 5], [0, 5, 3], [0, 3, 4],
            [1, 2, 4], [1, 5, 2], [1, 3, 5], [1, 4, 3]
        ];
        return { verts, triIdx };
    }
    const { verts: V, triIdx: T } = buildOcta(R);

    const faceNormals = [];
    const faceCenters = [];
    T.forEach(([a, b, c]) => {
        const va = V[a], vb = V[b], vc = V[c];
        faceCenters.push(new THREE.Vector3().addVectors(va, vb).add(vc).multiplyScalar(1 / 3));
        faceNormals.push(new THREE.Vector3().crossVectors(
            new THREE.Vector3().subVectors(vb, va),
            new THREE.Vector3().subVectors(vc, va)
        ).normalize());
    });

    // 每个面的"上方向" — 在平面内且尽量朝向世界Y+，保证任何面朝前时文字都是正的
    const worldUp = new THREE.Vector3(0, 1, 0);
    const faceUps = faceNormals.map(n => {
        const up = worldUp.clone().sub(n.clone().multiplyScalar(worldUp.dot(n)));
        if (up.lengthSq() < 0.001) up.set(1, 0, 0);
        return up.normalize();
    });

    // 构造目标旋转：让指定面朝前、上方向朝上（固定姿态，与当前姿态无关）
    function getRestQuaternion(faceIdx) {
        const zAxis = faceNormals[faceIdx].clone();
        const yAxis = faceUps[faceIdx].clone();
        const xAxis = new THREE.Vector3().crossVectors(yAxis, zAxis).normalize();
        yAxis.crossVectors(zAxis, xAxis).normalize();
        const basis = new THREE.Matrix4();
        basis.makeBasis(xAxis, yAxis, zAxis);
        const q = new THREE.Quaternion();
        q.setFromRotationMatrix(basis.clone().transpose());
        return q;
    }

    // 骰子回正角度与拖拽限制（钻石顶点朝上姿态）
    const REST_ROT_X = 0.25;   // 初始 X：更正，下面的字能看清
    const REST_ROT_Y = 0.30;
    const MAX_TILT_X = 0.65;   // X 轴：纵向限制 ±0.65
    const RETURN_SPEED = 0.12;  // 回正极慢，2~3 秒才完全归位，肉眼可见的缓慢飘落

    const diceGroup = new THREE.Group();
    diceGroup.rotation.x = REST_ROT_X;
    diceGroup.rotation.y = REST_ROT_Y;
    scene.add(diceGroup);

    // ==================== 文字纹理生成 — 截图同款暗金平面风格 ====================
    function createTextTexture(index) {
        const cvs = document.createElement('canvas');
        cvs.width = 1024; cvs.height = 512;
        const ctx = cvs.getContext('2d');

        // 透明背景
        ctx.clearRect(0, 0, 1024, 512);

        const name = FACES[index].name;
        const cx = 512, cy = 256;

        ctx.font = 'bold 152px "Noto Serif SC", "Source Han Serif SC", serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

        // 仅一层极微弱的厚度偏移 — 让文字有一点点浮雕感，但不厚重
        ctx.fillStyle = 'rgba(80, 60, 20, 0.35)';
        ctx.fillText(name, cx + 2, cy + 4);

        // 主文字 — 截图同款暗古铜金，平面无发光
        ctx.fillStyle = '#b8923a';
        ctx.fillText(name, cx, cy);

        // 极微弱的顶部提亮 — 增加一点点金属质感，不让字太平
        ctx.fillStyle = 'rgba(200, 170, 100, 0.25)';
        ctx.fillText(name, cx - 1, cy - 1);

        const tex = new THREE.CanvasTexture(cvs);
        tex.premultiplyAlpha = true;
        return tex;
    }

    // ==================== Shader ====================
    const glassVert = `
        varying vec3 vWorldPos;
        varying vec3 vNormal;
        varying vec3 vViewDir;
        void main() {
            vec4 wp = modelMatrix * vec4(position, 1.0);
            vWorldPos = wp.xyz;
            vNormal = normalize(normalMatrix * normal);
            vViewDir = normalize(cameraPosition - wp.xyz);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `;

    const glassFrag = `
        uniform vec3 uColorTop;
        uniform vec3 uColorBottom;
        uniform float uHoverBoost;
        uniform float uFresnelBoost;
        uniform float uEdgeGlow;
        uniform float uClickBoost;
        uniform float uFadeOut;
        uniform float uInnerLight;

        varying vec3 vWorldPos;
        varying vec3 vNormal;
        varying vec3 vViewDir;

        void main() {
            float t = clamp((vWorldPos.y + 2.5) / 5.0, 0.0, 1.0);
            vec3 baseColor = mix(uColorTop, uColorBottom, smoothstep(0.0, 1.0, t));

            float NdotV = max(dot(vNormal, vViewDir), 0.0);
            float fresnel = 0.04 + 0.96 * pow(1.0 - NdotV, 5.0);
            fresnel += uFresnelBoost * pow(1.0 - NdotV, 3.0);

            vec3 lightDir = normalize(vec3(0.5, 1.0, 0.5));
            vec3 halfDir = normalize(lightDir + vViewDir);
            float diff = max(dot(vNormal, lightDir), 0.0);
            float spec = pow(max(dot(vNormal, halfDir), 0.0), 256.0);

            // 玻璃本体极暗、极透 — 常态几乎隐形
            float transmission = mix(0.08, 0.28, t);
            transmission += uHoverBoost + uClickBoost;
            float opacity = transmission * 0.38;

            // 极暗的漫射 + 极弱的菲涅尔 + 极低高光
            vec3 diffuse = baseColor * (0.08 + 0.15 * diff);
            vec3 fresnelColor = vec3(0.6, 0.75, 0.85) * fresnel * 0.12;
            vec3 specular = vec3(0.8, 0.9, 1.0) * spec * fresnel * 0.18;
            vec3 transColor = vec3(0.0, 0.5, 0.7) * (1.0 - t) * 0.04;

            // 棱边金色扩散光晕 — 非常微弱
            vec3 edgeGlow = vec3(0.75, 0.62, 0.25) * uEdgeGlow * pow(1.0 - NdotV, 2.5);

            // 内部光源穿透效果 — 柔和暖白余烬光
            float distToCenter = length(vWorldPos);
            float innerAtten = 1.0 - smoothstep(1.5, 2.8, distToCenter);
            // 正对相机的面透光更强（NdotV 大），边缘面微微透光
            float innerGlow = uInnerLight * innerAtten * (0.2 + 0.6 * NdotV);
            // 颜色偏暖白而非纯黄，更自然
            vec3 innerColor = vec3(1.0, 0.88, 0.62) * innerGlow * 0.35;
            // 内部光微微增加透明度，但保持玻璃质感
            opacity += innerGlow * 0.06;

            vec3 finalColor = diffuse + fresnelColor + specular + transColor + edgeGlow + innerColor;
            float finalOpacity = opacity * (1.0 - uFadeOut);

            gl_FragColor = vec4(finalColor, finalOpacity);
        }
    `;

    // ==================== 创建 8 个面（玻璃 + 独立文字标签）====================
    const glassMeshes = [];
    const glassUniformsList = [];
    const textPlanes = [];
    const textMats = [];

    FACES.forEach((face, i) => {
        const [a, b, c] = T[i];
        const va = V[a], vb = V[b], vc = V[c];
        const normal = faceNormals[i];

        // 玻璃层
        const gGeo = new THREE.BufferGeometry();
        gGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
            va.x, va.y, va.z, vb.x, vb.y, vb.z, vc.x, vc.y, vc.z
        ]), 3));
        gGeo.computeVertexNormals();

        const gU = {
            uColorTop: { value: new THREE.Color(0x020810) },
            uColorBottom: { value: new THREE.Color(0x0a2030) },
            uHoverBoost: { value: 0 },
            uFresnelBoost: { value: 0 },
            uEdgeGlow: { value: 0.05 },
            uClickBoost: { value: 0 },
            uFadeOut: { value: 0 },
            uInnerLight: { value: 0 }
        };
        glassUniformsList.push(gU);

        const gMat = new THREE.ShaderMaterial({
            vertexShader: glassVert, fragmentShader: glassFrag,
            uniforms: gU, transparent: true, depthWrite: false, side: THREE.DoubleSide
        });
        const gMesh = new THREE.Mesh(gGeo, gMat);
        gMesh.userData.faceIndex = i;
        diceGroup.add(gMesh);
        glassMeshes.push(gMesh);

        // 截图同款暗金平面文字 — 无厚度，Normal 混合，实心字
        const textTex = createTextTexture(i);
        const textMat = new THREE.MeshBasicMaterial({
            map: textTex, transparent: true, depthWrite: false, opacity: 0.98
        });
        const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.7, 0.85), textMat);
        textPlane.userData.faceIndex = i;

        // 位置：面中心 + 法线方向微偏移，贴近玻璃
        const fc = faceCenters[i];
        textPlane.position.copy(fc).addScaledVector(normal, 0.02);

        // 旋转：Z轴对齐法线（朝外），Y轴对齐面上方向（保证字正）
        const zAxis = normal.clone();
        const yAxis = faceUps[i].clone();
        const xAxis = new THREE.Vector3().crossVectors(yAxis, zAxis).normalize();
        yAxis.crossVectors(zAxis, xAxis).normalize();
        const rotM = new THREE.Matrix4();
        rotM.makeBasis(xAxis, yAxis, zAxis);
        textPlane.setRotationFromMatrix(rotM);

        diceGroup.add(textPlane);
        textPlanes.push(textPlane);
        textMats.push(textMat);
    });

    // 边缘线框 — 暗古铜微光，低调深沉
    const edgeGeo = new THREE.OctahedronGeometry(R, 0);
    const edgeMat = new THREE.LineBasicMaterial({
        color: 0x6b5220, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending
    });
    diceGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(edgeGeo), edgeMat));

    loadingEl.style.display = 'none';

    // 八面体内部中心微光 — 纯光照，无可见几何体
    const innerGlow = new THREE.PointLight(0xff9944, 0, 10);
    innerGlow.position.set(0, 0, 0);
    diceGroup.add(innerGlow);

    // ==================== 背景景深雾效 ====================
    scene.fog = new THREE.FogExp2(0x080401, 0.035); // 暖褐烟雾，余烬氛围

    // 远处模糊几何碎片 — 增加空间层次感
    const debrisGroup = new THREE.Group();
    scene.add(debrisGroup);
    const debrisMat = new THREE.MeshBasicMaterial({
        color: 0x141e22, transparent: true, opacity: 0.2
    });
    for (let i = 0; i < 40; i++) {
        const dGeo = new THREE.TetrahedronGeometry(Math.random() * 0.15 + 0.05, 0);
        const dMesh = new THREE.Mesh(dGeo, debrisMat);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        const dist = 12 + Math.random() * 18;
        dMesh.position.set(
            dist * Math.sin(phi) * Math.cos(theta),
            dist * Math.cos(phi),
            dist * Math.sin(phi) * Math.sin(theta)
        );
        dMesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        debrisGroup.add(dMesh);
    }

    // ==================== 状态机 ====================
    const STATE = { IDLE: 0, HOVERED: 1, FLOW: 2, ZOOM: 3, FADE: 4 };
    let state = STATE.IDLE;
    let hoverFace = -1;
    let clickedFace = -1;
    let transitionStartTime = 0;
    let preRotateTarget = null;
    let preRotateStartQ = null;
    let autoRotate = false;
    let isDragging = false;
    let prevX = 0, prevY = 0;
    let dragStartPos = { x: 0, y: 0 };
    const autoSpeed = 0.003;

    // 惯性系统
    let inertiaX = 0; // X轴角速度
    let inertiaY = 0; // Y轴角速度
    const inertiaDamping = 0.955;  // 衰减适中，轻碰只转半圈到一圈
    const inertiaThreshold = 0.00015; // 适中停止阈值
    const IDLE_SPIN = 0.003;       // 空闲时的微自转速度（Y轴持续缓慢旋转）

    // BFS 流光顺序缓存
    const bfsOrders = FACES.map((_, i) => bfsOrder(i));

    // 缓动函数
    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    // 重置所有面到默认
    function resetAllFaces() {
        for (let i = 0; i < 8; i++) {
            glassUniformsList[i].uHoverBoost.value = 0;
            glassUniformsList[i].uFresnelBoost.value = 0;
            glassUniformsList[i].uEdgeGlow.value = 0.05;
            glassUniformsList[i].uClickBoost.value = 0;
            glassUniformsList[i].uFadeOut.value = 0;
            glassUniformsList[i].uInnerLight.value = 0;
            textMats[i].color.setRGB(0.72, 0.58, 0.35);
            textMats[i].opacity = 0.9;
        }
        innerGlow.intensity = 0;
        bloomPass.strength = BASE_BLOOM_STRENGTH;
    }

    // 更新悬停面
    function updateHover(faceIdx, dt) {
        const speed = 1.4; // 0.7s 缓动 ~= 1/0.7
        for (let i = 0; i < 8; i++) {
            const g = glassUniformsList[i];
            if (i === faceIdx) {
                // 悬停面渐变 — 玻璃微微透出内部光，文字提亮为暗古铜高光
                g.uHoverBoost.value = lerp(g.uHoverBoost.value, 0.06, dt * speed);
                g.uFresnelBoost.value = lerp(g.uFresnelBoost.value, 0.10, dt * speed);
                g.uEdgeGlow.value = lerp(g.uEdgeGlow.value, 0.10, dt * speed);
                g.uInnerLight.value = lerp(g.uInnerLight.value, 0.15, dt * speed); // 悬停时微微透光
                const tc = textMats[i].color;
                tc.r = lerp(tc.r, 0.92, dt * speed);
                tc.g = lerp(tc.g, 0.78, dt * speed);
                tc.b = lerp(tc.b, 0.48, dt * speed);
                textMats[i].opacity = lerp(textMats[i].opacity, 1.0, dt * speed);
            } else {
                // 非悬停面恢复为暗古铜默认
                g.uHoverBoost.value = lerp(g.uHoverBoost.value, 0, dt * speed);
                g.uFresnelBoost.value = lerp(g.uFresnelBoost.value, 0, dt * speed);
                g.uEdgeGlow.value = lerp(g.uEdgeGlow.value, 0.05, dt * speed);
                g.uInnerLight.value = lerp(g.uInnerLight.value, 0, dt * speed);
                const tc = textMats[i].color;
                tc.r = lerp(tc.r, 0.72, dt * speed);
                tc.g = lerp(tc.g, 0.58, dt * speed);
                tc.b = lerp(tc.b, 0.35, dt * speed);
                textMats[i].opacity = lerp(textMats[i].opacity, 0.85, dt * speed);
            }
        }
    }

    // ==================== 射线检测 ====================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function getHoveredFace(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(glassMeshes);
        // 过滤：只取最近的正面相交，排除穿透后的背面相交
        for (let i = 0; i < hits.length; i++) {
            const hit = hits[i];
            const faceIdx = hit.object.userData.faceIndex;
            const worldNormal = faceNormals[faceIdx].clone().applyQuaternion(diceGroup.quaternion).normalize();
            // ray 方向与法向量点积 < 0 表示 ray 从外向内射入（正面）
            if (raycaster.ray.direction.dot(worldNormal) < 0) {
                return faceIdx;
            }
        }
        return -1;
    }

    // ==================== 鼠标拖尾 & 粒子气流系统 ====================
    const trailCanvas = document.getElementById('cursor-trail');
    const trailCtx = trailCanvas.getContext('2d');
    trailCanvas.width = window.innerWidth;
    trailCanvas.height = window.innerHeight;

    const trailPoints = [];
    const MAX_TRAIL = 90;
    let trailOn = localStorage.getItem('ash_trail_on') !== '0';
    window.__setMouseTrail = function (on) {
        trailOn = !!on;
        localStorage.setItem('ash_trail_on', trailOn ? '1' : '0');
        const btn = document.getElementById('trail-toggle');
        if (btn) {
            btn.classList.toggle('off', !trailOn);
            btn.title = trailOn ? '关闭鼠标火光拖尾' : '开启鼠标火光拖尾';
            btn.innerHTML = '<span class="trail-icon">✦</span><span class="trail-label">火光拖尾：' + (trailOn ? '开' : '关') + '</span>';
        }
        if (!trailOn) {
            trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
            trailPoints.length = 0; // 清空残留粒子
        }
    };
    let lastMouseX = -1000, lastMouseY = -1000;
    const mouseWorldPos = new THREE.Vector3(0, 0, 0);
    const mouseNDC = new THREE.Vector2();
    const trailRaycaster = new THREE.Raycaster();
    const trailPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    let mouseActive = false;
    let mouseInactiveTimer = 0;
    let glowFade = 0;            // 光晕淡出系数 0~1
    const GLOW_FADE_SPEED = 1.8; // 约 0.55s 消完

    function updateMouseWorld(clientX, clientY) {
        mouseNDC.x = (clientX / window.innerWidth) * 2 - 1;
        mouseNDC.y = -(clientY / window.innerHeight) * 2 + 1;
        trailRaycaster.setFromCamera(mouseNDC, camera);
        const intersect = new THREE.Vector3();
        trailRaycaster.ray.intersectPlane(trailPlane, intersect);
        if (intersect) mouseWorldPos.copy(intersect);
    }

    window.addEventListener('resize', () => {
        trailCanvas.width = window.innerWidth;
        trailCanvas.height = window.innerHeight;
    });

    // ==================== 事件 — 两层碰撞判断 ====================
    // isOnDice:   鼠标在骰子本体上（raycaster 命中）→ 减速 0.5s 后静止
    // isDragging: 拖拽中 → 自由翻转

    let isOnDice = false;
    let hoverOnDiceTimer = 0; // 鼠标在骰子上的累计时间

    window.addEventListener('mousemove', e => {
        if (!trailOn) return; // 关闭状态不记录
        // --- 拖尾记录 — 散落粒子 ---
        mouseActive = true;
        mouseInactiveTimer = 0;
        glowFade = 1.0; // 移动时立刻全亮
        updateMouseWorld(e.clientX, e.clientY);

        lastMouseX = e.clientX;
        lastMouseY = e.clientY;

        // 每次移动生成 2~4 个带随机偏移的粒子，模拟星尘散落
        const spawnCount = Math.floor(Math.random() * 3) + 2;
        for (let s = 0; s < spawnCount; s++) {
            const offsetX = (Math.random() - 0.5) * 14;
            const offsetY = (Math.random() - 0.5) * 14;
            trailPoints.push({
                x: e.clientX + offsetX,
                y: e.clientY + offsetY,
                life: 0.7 + Math.random() * 0.3,
                size: Math.random() * 1.8 + 0.6
            });
        }
        while (trailPoints.length > MAX_TRAIL) trailPoints.shift();

        // --- 骰子悬停 ---
        if (state !== STATE.IDLE || isDragging) return;
        const f = getHoveredFace(e.clientX, e.clientY);
        const wasOnDice = isOnDice;
        isOnDice = f !== -1;
        if (isOnDice && !wasOnDice) {
            hoverOnDiceTimer = 0; // 刚进入，重置计时
        }
        if (!isOnDice) {
            hoverOnDiceTimer = 0; // 离开，重置
            hoverFace = -1;
            resetAllFaces();
        } else if (f !== hoverFace) {
            hoverFace = f;
        }
    });

    canvas.addEventListener('mousedown', e => {
        if (state !== STATE.IDLE && state !== STATE.HOVERED) return;
        isDragging = true;
        prevX = e.clientX;
        prevY = e.clientY;
        dragStartPos = { x: e.clientX, y: e.clientY };
        canvas.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const dx = e.clientX - prevX;
        const dy = e.clientY - prevY;
        diceGroup.rotation.y += dx * 0.010;  // Y 轴：横向无限旋转，无限制
        diceGroup.rotation.x += dy * 0.010;  // X 轴：纵向摆动
        // X 轴硬边界（Y 轴无边界）
        diceGroup.rotation.x = Math.max(REST_ROT_X - MAX_TILT_X, Math.min(REST_ROT_X + MAX_TILT_X, diceGroup.rotation.x));
        inertiaY = dx * 0.010;
        inertiaX = dy * 0.010;
        prevX = e.clientX;
        prevY = e.clientY;
    });
    window.addEventListener('mouseup', e => {
        if (!isDragging) return;
        isDragging = false;
        canvas.style.cursor = 'grab';

        // 检测点击（非拖拽）
        const dx = e.clientX - dragStartPos.x;
        const dy = e.clientY - dragStartPos.y;
        if (Math.sqrt(dx * dx + dy * dy) <= 5) {
            const f = getHoveredFace(e.clientX, e.clientY);
            if (f !== -1 && state === STATE.IDLE) {
                startClickTransition(f);
            }
        }
        // 如果拖拽距离很小，清空惯性（避免点击触发惯性）
        if (Math.sqrt(dx * dx + dy * dy) <= 5) {
            inertiaX = 0;
            inertiaY = 0;
        }
    });

    // 触摸
    canvas.addEventListener('touchstart', e => {
        if (state !== STATE.IDLE) return;
        isDragging = true;
        prevX = e.touches[0].clientX;
        prevY = e.touches[0].clientY;
        dragStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
        if (!isDragging) return;
        e.preventDefault();
        const dx = e.touches[0].clientX - prevX;
        const dy = e.touches[0].clientY - prevY;
        diceGroup.rotation.y += dx * 0.010;  // Y 轴：横向无限旋转
        diceGroup.rotation.x += dy * 0.010;  // X 轴：纵向摆动
        // X 轴硬边界（Y 轴无边界）
        diceGroup.rotation.x = Math.max(REST_ROT_X - MAX_TILT_X, Math.min(REST_ROT_X + MAX_TILT_X, diceGroup.rotation.x));
        inertiaY = dx * 0.010;
        inertiaX = dy * 0.010;
        prevX = e.touches[0].clientX;
        prevY = e.touches[0].clientY;
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
        if (!isDragging) return;
        isDragging = false;
        const dx = e.changedTouches[0].clientX - dragStartPos.x;
        const dy = e.changedTouches[0].clientY - dragStartPos.y;
        if (Math.sqrt(dx * dx + dy * dy) <= 5) {
            const f = getHoveredFace(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            if (f !== -1 && state === STATE.IDLE) startClickTransition(f);
            inertiaX = 0;
            inertiaY = 0;
        }
    });

    function getFacingFace() {
        const toFront = new THREE.Vector3(0, 0, 1);
        let best = 0, bestDot = -Infinity;
        for (let i = 0; i < 8; i++) {
            const wn = faceNormals[i].clone().applyQuaternion(diceGroup.quaternion);
            const d = wn.dot(toFront);
            if (d > bestDot) { bestDot = d; best = i; }
        }
        return best;
    }

    function updateFaceInfo(idx) {
        const f = FACES[idx];
        document.getElementById('face-name').textContent = f.name;
        document.getElementById('face-desc').textContent = f.desc;
        document.getElementById('enter-btn').href = f.href;
    }

    function rotateToFace(idx) {
        autoRotate = false;

        const startQ = diceGroup.quaternion.clone();
        const endQ = getRestQuaternion(idx).clone();
        const startT = performance.now();

        (function tick(now) {
            const p = Math.min((now - startT) / 800, 1);
            diceGroup.quaternion.slerpQuaternions(startQ, endQ, easeOutCubic(p));
            if (p < 1) {
                requestAnimationFrame(tick);
            } else {
                updateFaceInfo(idx);
            }
        })(startT);
    }

    // ==================== 点击转场 ====================
    function startClickTransition(faceIdx) {
        if (state === STATE.FLOW || state === STATE.FADE) return; // 防止重复启动
        state = STATE.FLOW;
        clickedFace = faceIdx;
        transitionStartTime = performance.now();
        hoverFace = -1;
        preRotateStartQ = diceGroup.quaternion.clone();
        preRotateTarget = getRestQuaternion(faceIdx);

        // 设置过渡文字
        document.getElementById('transition-text').textContent =
            '正在前往 ' + FACES[faceIdx].name + '...';

        // 隐藏 UI
        document.getElementById('page-header').style.opacity = '0';
        document.getElementById('page-footer').style.opacity = '0';
        document.getElementById('face-info').style.opacity = '0';
    }

    // ==================== 动画循环 ====================
    let lastTime = performance.now();
    let lastFaceCheck = 0;

    // 呼吸动效参数
    const breatheSpeed = 0.8;   // 呼吸周期 ~7.8s
    const breatheAmpY = 0.08;   // Y轴上下浮动幅度
    const breatheAmpX = 0.04;   // X轴轻微摇摆幅度

    function animate(time) {
        requestAnimationFrame(animate);
        const dt = Math.min((time - lastTime) / 1000, 0.05);
        lastTime = time;

        // ---------- IDLE / HOVERED ----------
        if (state === STATE.IDLE || state === STATE.HOVERED) {
            // Y轴呼吸动效
            const breathePhase = time * 0.001 * breatheSpeed;
            diceGroup.position.y = Math.sin(breathePhase) * breatheAmpY;
            // X轴轻微摇摆
            diceGroup.rotation.z = Math.sin(breathePhase + 1.0) * breatheAmpX * 0.5;

            // 惯性衰减（释放后自由旋转，Y轴无限，X轴有边界）
            if (!isDragging && (Math.abs(inertiaX) > inertiaThreshold || Math.abs(inertiaY) > inertiaThreshold)) {
                diceGroup.rotation.x += inertiaX;
                diceGroup.rotation.y += inertiaY;  // Y 轴自由旋转，无边界
                inertiaX *= inertiaDamping;
                inertiaY *= inertiaDamping;

                // X 轴硬边界（Y 轴无边界）
                diceGroup.rotation.x = Math.max(REST_ROT_X - MAX_TILT_X, Math.min(REST_ROT_X + MAX_TILT_X, diceGroup.rotation.x));
            }

            // 惯性衰减完后：X 轴缓慢回正，Y 轴保持微自转
            if (!isDragging && Math.abs(inertiaX) <= inertiaThreshold && Math.abs(inertiaY) <= inertiaThreshold) {
                const dt_clamped = Math.min(dt, 0.05);
                diceGroup.rotation.x += (REST_ROT_X - diceGroup.rotation.x) * RETURN_SPEED * dt_clamped;
                diceGroup.rotation.y += IDLE_SPIN; // Y 轴持续微自转
            }

            if (hoverFace !== -1) {
                updateHover(hoverFace, dt);
            }
        }

        // ---------- FLOW (0~0.35s：一气呵成，只有一个亮度曲线) ----------
        if (state === STATE.FLOW) {
            const elapsed = (time - transitionStartTime) / 1000;
            const DURATION = 0.35;
            const t = Math.min(elapsed / DURATION, 1);
            const ease = easeInOutCubic(t);

            // 1. 回正旋转 — 0~0.28s 完成
            const rotEase = elapsed < 0.28 ? easeOutCubic(elapsed / 0.28) : 1.0;
            diceGroup.quaternion.slerpQuaternions(preRotateStartQ, preRotateTarget, rotEase);

            // 2. 内部发光 — 从当前悬停值平滑提升，0~0.08s 达峰，无跳变
            const glowEase = easeOutCubic(Math.min(elapsed / 0.08, 1));
            for (let i = 0; i < 8; i++) {
                const g = glassUniformsList[i];
                const targetLight = i === clickedFace ? 0.70 : 0.30;
                g.uInnerLight.value = lerp(g.uInnerLight.value, targetLight, glowEase);
                // 悬停效果同步消退
                g.uHoverBoost.value = lerp(g.uHoverBoost.value, 0, glowEase);
                g.uFresnelBoost.value = lerp(g.uFresnelBoost.value, 0, glowEase);
                g.uEdgeGlow.value = lerp(g.uEdgeGlow.value, 0.05, glowEase);
            }
            innerGlow.intensity = lerp(innerGlow.intensity, 2.0, glowEase);
            innerGlow.color.setHSL(0.08, 0.8, 0.55);

            // 3. 文字 — 直接开始淡出，不爆亮。0~0.15s 完全消失
            const textFadeT = Math.min(elapsed / 0.15, 1);
            for (let i = 0; i < 8; i++) {
                const tc = textMats[i].color;
                tc.r = lerp(tc.r, 0.10, textFadeT);
                tc.g = lerp(tc.g, 0.07, textFadeT);
                tc.b = lerp(tc.b, 0.02, textFadeT);
                textMats[i].opacity = lerp(textMats[i].opacity, 0.0, textFadeT);
            }

            // 4. 相机推进 — 0~0.35s 平滑推进
            const targetPos = faceCenters[clickedFace].clone().applyQuaternion(preRotateTarget);
            targetPos.z += 2.0;
            camera.position.lerpVectors(ORIGIN_CAM_POS, targetPos, ease);

            // 5. Bloom 轻微提升
            bloomPass.strength = lerp(BASE_BLOOM_STRENGTH, BASE_BLOOM_STRENGTH * 1.2, glowEase);

            // 6. 玻璃淡出 — 0.15s 开始，0.15~0.35s 完成
            if (elapsed > 0.15) {
                const fadeT = Math.min((elapsed - 0.15) / 0.20, 1);
                for (let i = 0; i < 8; i++) {
                    glassUniformsList[i].uFadeOut.value = fadeT;
                }
            }

            // 7. 全黑过渡层 — 0.15s 开始同步淡入，确保跳转前屏幕已纯黑
            if (elapsed > 0.15) {
                overlay.classList.add('active');
            }

            // 8. 镜头推进到最后 10% 时直接跳转 — 不进入任何中间画面
            if (t >= 1.0) {
                state = STATE.FADE; // 互锁：防止 requestAnimationFrame 下一帧重复跳转
                ashTransition.out(FACES[clickedFace].href);
                return;
            }
        }

        // 更新文字标签可见性 — 只显示朝向相机的面
        textPlanes.forEach((plane, i) => {
            const normal = faceNormals[i].clone().applyQuaternion(diceGroup.quaternion);
            const worldPos = plane.position.clone().applyMatrix4(diceGroup.matrixWorld);
            const viewDir = camera.position.clone().sub(worldPos).normalize();
            plane.visible = viewDir.dot(normal) > 0;
        });

        // 灰烬粒子更新 — 火星快速飞舞 + 重力/湍流 + 鼠标热源 + 骰子碰撞
        ashUniforms.uTime.value = time * 0.001;
        ashUniforms.uMousePos.value.copy(mouseWorldPos);
        ashUniforms.uMouseActive.value = mouseActive ? 1.0 : 0.0;
        const ashPos = ashGeo.attributes.position.array;

        const influenceRadius = MOUSE_INF_R;
        const maxForce = MOUSE_FORCE;
        const recoverRate = VEL_DECAY;
        const G = GRAVITY;
        const T = TURBULENCE;

        // 鼠标静止时逐渐停止影响，光晕缓慢淡出
        mouseInactiveTimer += dt;
        if (mouseInactiveTimer > 0.4) {
            mouseActive = false;
            glowFade = Math.max(0, glowFade - GLOW_FADE_SPEED * dt);
        }

        for (let i = 0; i < ASH_COUNT; i++) {
            const px = ashPos[i * 3];
            const py = ashPos[i * 3 + 1];
            const pz = ashPos[i * 3 + 2];

            // --- 重力 + 湍流（每帧加速度）---
            ashVel[i * 3]     += (Math.random() - 0.5) * T * dt;
            ashVel[i * 3 + 1] += G * dt + (Math.random() - 0.5) * T * dt;
            ashVel[i * 3 + 2] += (Math.random() - 0.5) * T * 0.4 * dt;

            // --- 鼠标热源影响（纯排斥吹开，穿透骰子）---
            if (mouseActive) {
                const dx = px - mouseWorldPos.x;
                const dy = py - mouseWorldPos.y;
                const distSq = dx * dx + dy * dy;
                if (distSq < influenceRadius * influenceRadius && distSq > 0.01) {
                    const dist = Math.sqrt(distSq);
                    const falloff = 1 - dist / influenceRadius;
                    const smoothFalloff = falloff * falloff * (3 - 2 * falloff);
                    const force = smoothFalloff * maxForce;
                    const nx = dx / dist;
                    const ny = dy / dist;
                    ashVel[i * 3]     += nx * force * dt;
                    ashVel[i * 3 + 1] += ny * force * dt;
                    ashVel[i * 3 + 2] += (Math.random() - 0.5) * force * 0.4 * dt;
                }
            }

            // --- 骰子碰撞 — 粒子不能穿过骰子（球体近似 R=2.9）---
            const diceY = diceGroup.position.y;
            const ddx = px;
            const ddy = py - diceY;
            const ddz = pz;
            const distDiceSq = ddx*ddx + ddy*ddy + ddz*ddz;
            if (distDiceSq < DICE_COLLISION_R * DICE_COLLISION_R) {
                const distDice = Math.sqrt(distDiceSq) + 0.001;
                const ndx = ddx / distDice;
                const ndy = ddy / distDice;
                const ndz = ddz / distDice;
                // 直接推出骰子（位置修正）
                const overlap = DICE_COLLISION_R - distDice + 0.015;
                ashPos[i * 3]     += ndx * overlap;
                ashPos[i * 3 + 1] += ndy * overlap;
                ashPos[i * 3 + 2] += ndz * overlap;
                // 反弹速度
                ashVel[i * 3]     += ndx * 10.0;
                ashVel[i * 3 + 1] += ndy * 10.0;
                ashVel[i * 3 + 2] += ndz * 10.0;
            }

            // 额外速度衰减（空气阻力）
            ashVel[i * 3]     *= (1 - recoverRate * dt);
            ashVel[i * 3 + 1] *= (1 - recoverRate * dt);
            ashVel[i * 3 + 2] *= (1 - recoverRate * dt);

            // 更新位置（基础速度 + 额外速度）
            ashPos[i * 3]     += (ashSpeed[i * 3]     + ashVel[i * 3])     * dt;
            ashPos[i * 3 + 1] += (ashSpeed[i * 3 + 1] + ashVel[i * 3 + 1]) * dt;
            ashPos[i * 3 + 2] += (ashSpeed[i * 3 + 2] + ashVel[i * 3 + 2]) * dt;

            // 出界重置 — 从右下方重新进入，重置额外速度
            if (ashPos[i * 3] < -24) { ashPos[i * 3] = 24; ashVel[i*3]=0; ashVel[i*3+1]=0; ashVel[i*3+2]=0; }
            if (ashPos[i * 3 + 1] > 24) { ashPos[i * 3 + 1] = -24; ashVel[i*3]=0; ashVel[i*3+1]=0; ashVel[i*3+2]=0; }
            if (ashPos[i * 3 + 2] > ZRNG[1] || ashPos[i * 3 + 2] < ZRNG[0]) {
                ashPos[i * 3 + 2] = Math.random() * (ZRNG[1] - ZRNG[0]) + ZRNG[0];
                ashVel[i*3]=0; ashVel[i*3+1]=0; ashVel[i*3+2]=0;
            }
        }
        ashGeo.attributes.position.needsUpdate = true;

        // 远处碎片缓慢旋转 — 增加空间层次动感
        debrisGroup.rotation.y += 0.0002;
        debrisGroup.rotation.x += 0.00008;

        // --- 绘制鼠标光影跟踪（环境光晕，glowFade 淡出）---
        trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
        if (trailOn) {
        if (glowFade > 0.01 && lastMouseX > -100) {
            const f = glowFade;
            // 大范围热源光晕 — 暖橙琥珀色，像火焰/余烬的热量扩散
            const lightGrad = trailCtx.createRadialGradient(
                lastMouseX, lastMouseY, 0,
                lastMouseX, lastMouseY, 220
            );
            lightGrad.addColorStop(0, 'rgba(255, 180, 80, ' + (0.07 * f) + ')');
            lightGrad.addColorStop(0.2, 'rgba(255, 160, 60, ' + (0.045 * f) + ')');
            lightGrad.addColorStop(0.5, 'rgba(240, 130, 40, ' + (0.018 * f) + ')');
            lightGrad.addColorStop(1, 'rgba(220, 100, 20, 0)');
            trailCtx.fillStyle = lightGrad;
            trailCtx.beginPath();
            trailCtx.arc(lastMouseX, lastMouseY, 220, 0, Math.PI * 2);
            trailCtx.fill();

            // 核心聚焦热源
            const coreGrad = trailCtx.createRadialGradient(
                lastMouseX, lastMouseY, 0,
                lastMouseX, lastMouseY, 60
            );
            coreGrad.addColorStop(0, 'rgba(255, 230, 180, ' + (0.12 * f) + ')');
            coreGrad.addColorStop(0.4, 'rgba(255, 200, 120, ' + (0.06 * f) + ')');
            coreGrad.addColorStop(1, 'rgba(255, 170, 80, 0)');
            trailCtx.fillStyle = coreGrad;
            trailCtx.beginPath();
            trailCtx.arc(lastMouseX, lastMouseY, 60, 0, Math.PI * 2);
            trailCtx.fill();
        }

        // --- 绘制鼠标热源粒子拖尾 — 暖金橙 ---
        if (trailPoints.length > 0) {
            trailCtx.globalCompositeOperation = 'lighter';
            for (let i = trailPoints.length - 1; i >= 0; i--) {
                const p = trailPoints[i];
                const progress = i / trailPoints.length;
                const alpha = p.life * (0.15 + progress * 0.85);
                const r = p.size * p.life * (0.4 + progress * 0.6);

                // 外发光（暖橙光晕）
                const g1 = trailCtx.createRadialGradient(
                    p.x, p.y, 0,
                    p.x, p.y, r * 4
                );
                g1.addColorStop(0, `rgba(255, 180, 60, ${alpha * 0.6})`);
                g1.addColorStop(0.3, `rgba(255, 150, 40, ${alpha * 0.3})`);
                g1.addColorStop(1, `rgba(255, 120, 20, 0)`);
                trailCtx.fillStyle = g1;
                trailCtx.beginPath();
                trailCtx.arc(p.x, p.y, r * 4, 0, Math.PI * 2);
                trailCtx.fill();

                // 核心亮点（暖白）
                trailCtx.fillStyle = `rgba(255, 245, 220, ${alpha})`;
                trailCtx.beginPath();
                trailCtx.arc(p.x, p.y, r, 0, Math.PI * 2);
                trailCtx.fill();
            }
            trailCtx.globalCompositeOperation = 'source-over';

            // 衰减 life
            for (let i = trailPoints.length - 1; i >= 0; i--) {
                trailPoints[i].life -= 0.022;
                if (trailPoints[i].life <= 0) trailPoints.splice(i, 1);
            }
        }

        }

        composer.render();
    }

    // === particle params (edit here, tell AI to change) ===
    const ASH_COUNT = 5000;         // 更多粒子，更密集
    const MOUSE_INF_R = 1.8;        // 鼠标热源影响半径（小，精确）
    const MOUSE_FORCE = 500.0;      // 热风吹开力
    const GRAVITY = -3.5;           // 微重力，火星缓慢飘升
    const TURBULENCE = 10.0;        // 轻柔湍流
    const VEL_DECAY = 2.2;          // 额外速度衰减率
    const GLOW_R = 2.0;
    const SZ_FAR = [0.04, 0.10];    // 更小粒子
    const SZ_MID = [0.08, 0.18];
    const SZ_NEAR = [0.12, 0.28];
    const ZRNG = [-22, -2];
    const DICE_COLLISION_R = 2.9;  // 骰子碰撞半径
    // ============================================
    const ashGeo = new THREE.BufferGeometry();
    const ashPositions = new Float32Array(ASH_COUNT * 3);
    const ashColors   = new Float32Array(ASH_COUNT * 3);
    const ashSizes    = new Float32Array(ASH_COUNT);
    const ashPhase    = new Float32Array(ASH_COUNT); // 各粒子独立闪烁相位
    const ashFreq     = new Float32Array(ASH_COUNT); // 各粒子独立闪烁频率
    const ashSpeed    = new Float32Array(ASH_COUNT * 3); // 基础速度
    const ashVel      = new Float32Array(ASH_COUNT * 3); // 鼠标扰动速度
    const ashDrift    = new Float32Array(ASH_COUNT * 2); // 漂移噪声参数 [phaseX, phaseY]

    for (let i = 0; i < ASH_COUNT; i++) {
        // 分布范围：X(-20~20), Y(-15~15), Z(-16~-4) — 全部在骰子(Z≈0)后面
        ashPositions[i * 3]     = (Math.random() - 0.5) * 40;
        ashPositions[i * 3 + 1] = (Math.random() - 0.5) * 30;
        ashPositions[i * 3 + 2] = Math.random() * (ZRNG[1] - ZRNG[0]) + ZRNG[0];

        const z = ashPositions[i * 3 + 2];
        let r, g, b, size;

        if (z < -8) {
            // 远景 — 深暗橙/暗红，融入黑背景
            const t = Math.random();
            r = 0.35 + t * 0.25;     // 0.35~0.60 暗橙
            g = 0.10 + t * 0.12;     // 0.10~0.22 低绿
            b = 0.02 + t * 0.06;     // 0.02~0.08 微蓝
            size = SZ_FAR[0] + Math.random() * (SZ_FAR[1] - SZ_FAR[0]);
        } else if (z <= -2) {
            // 中景 — 主体橙金火星
            const t = Math.random();
            r = 0.65 + t * 0.30;     // 0.65~0.95 橙红
            g = 0.25 + t * 0.35;     // 0.25~0.60 金黄
            b = 0.04 + t * 0.10;     // 0.04~0.14 暖底
            size = SZ_MID[0] + Math.random() * (SZ_MID[1] - SZ_MID[0]);
        } else {
            // 近景 — 亮黄白火星，像真火
            r = 0.95 + Math.random() * 0.05;
            g = 0.55 + Math.random() * 0.35;
            b = 0.10 + Math.random() * 0.20;
            size = SZ_NEAR[0] + Math.random() * (SZ_NEAR[1] - SZ_NEAR[0]);
        }

        ashColors[i * 3]     = r;
        ashColors[i * 3 + 1] = g;
        ashColors[i * 3 + 2] = b;
        ashSizes[i] = size;
        ashPhase[i] = Math.random() * Math.PI * 2;
        ashFreq[i]  = 1.0 + Math.random() * 2.5; // 闪烁频率 1~3.5
        ashDrift[i * 2]     = Math.random() * Math.PI * 2; // drift phase X
        ashDrift[i * 2 + 1] = Math.random() * Math.PI * 2; // drift phase Y

        // 基础速度 — 火星轻柔飘动，偏向上方
        const speedMag = 3.0 + Math.random() * 7.0; // 3~10
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 0.45; // 0~81°，偏向上
        ashSpeed[i * 3]     = Math.sin(phi) * Math.cos(theta) * speedMag;
        ashSpeed[i * 3 + 1] = Math.cos(phi) * speedMag;
        ashSpeed[i * 3 + 2] = Math.sin(phi) * Math.sin(theta) * speedMag;
    }

    ashGeo.setAttribute('position', new THREE.Float32BufferAttribute(ashPositions, 3));
    ashGeo.setAttribute('color',    new THREE.Float32BufferAttribute(ashColors, 3));
    ashGeo.setAttribute('size',     new THREE.Float32BufferAttribute(ashSizes, 1));
    ashGeo.setAttribute('phase',    new THREE.Float32BufferAttribute(ashPhase, 1));
    ashGeo.setAttribute('freq',     new THREE.Float32BufferAttribute(ashFreq, 1));

    // 顶点着色器 — 闪烁、鼠标高亮、大小衰减
    const ashVert = `
        attribute float size;
        attribute vec3 color;
        attribute float phase;
        attribute float freq;
        varying vec3 vColor;
        varying float vAlpha;
        uniform float uTime;
        uniform float uFlashStrength;
        uniform vec3 uMousePos;
        uniform float uMouseActive;
        void main() {
            vec3 c = color;
            float a = 1.0;

            // 鼠标附近粒子高亮 — 暖金色光辉（穿透所有Z）
            if (uMouseActive > 0.5) {
                float d = length(position.xy - uMousePos.xy);
                float glowRadius = 2.0;
                if (d < glowRadius) {
                    float glow = 1.0 - d / glowRadius;
                    glow = glow * glow * (3.0 - 2.0 * glow);
                    // 暖金高亮 vec3(1.0, 0.78, 0.45)
                    c = mix(c, vec3(1.0, 0.78, 0.45), glow * 0.80);
                    a = 1.0 + glow * 1.2;
                }
            }

            vColor = c;

            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

            // 闪烁：基于时间和粒子独立频率/相位，各粒子异步闪烁
            float flash = sin(uTime * freq + phase) * 0.5 + 0.5;
            flash = pow(flash, 2.2); // 柔和闪烁曲线
            vAlpha = (0.30 + flash * uFlashStrength * 0.45) * a;

            // 鼠标高亮粒子稍微变大（穿透所有Z）
            float sizeMult = 1.0;
            if (uMouseActive > 0.5) {
                float d = length(position.xy - uMousePos.xy);
                float glowRadius = 2.0;
                if (d < glowRadius) {
                    float glow = 1.0 - d / glowRadius;
                    glow = glow * glow * (3.0 - 2.0 * glow);
                    sizeMult = 1.0 + glow * 0.5;
                }
            }
            gl_PointSize = size * sizeMult * (450.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    `;
    const ashFrag = `
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
            float d = length(gl_PointCoord - vec2(0.5));
            if (d > 0.5) discard;
            float alpha = smoothstep(0.5, 0.12, d) * vAlpha;
            gl_FragColor = vec4(vColor, alpha);
        }
    `;
    const ashUniforms = {
        uTime:          { value: 0 },
        uFlashStrength: { value: 0.55 },
        uMousePos:      { value: new THREE.Vector3(0, 0, 0) },
        uMouseActive:   { value: 0.0 }
    };
    const ashMat = new THREE.ShaderMaterial({
        vertexShader:   ashVert,
        fragmentShader: ashFrag,
        uniforms:       ashUniforms,
        transparent:    true,
        depthWrite:     false,
        blending:       THREE.AdditiveBlending
    });
    const ashParticles = new THREE.Points(ashGeo, ashMat);
    scene.add(ashParticles);

    // 粒子开关按钮逻辑
    const particleToggleBtn = document.getElementById('particle-toggle');
    let particlesVisible = localStorage.getItem('ash_particles_on') !== 'false';
    // 应用初始状态
    ashParticles.visible = particlesVisible;
    particleToggleBtn.textContent = particlesVisible ? '灰烬粒子：开' : '灰烬粒子：关';
    particleToggleBtn.classList.toggle('off', !particlesVisible);
    particleToggleBtn.addEventListener('click', () => {
        particlesVisible = !particlesVisible;
        localStorage.setItem('ash_particles_on', particlesVisible ? '1' : '0');
        ashParticles.visible = particlesVisible;
        particleToggleBtn.textContent = particlesVisible ? '灰烬粒子：开' : '灰烬粒子：关';
        particleToggleBtn.classList.toggle('off', !particlesVisible);
    });

    // 火光拖尾开关按钮逻辑
    const trailToggleBtn = document.getElementById('trail-toggle');
    if (trailToggleBtn) {
        // 应用初始状态
        trailToggleBtn.classList.toggle('off', !trailOn);
        trailToggleBtn.title = trailOn ? '关闭鼠标火光拖尾' : '开启鼠标火光拖尾';
        trailToggleBtn.innerHTML = '<span class="trail-icon">✦</span><span class="trail-label">火光拖尾：' + (trailOn ? '开' : '关') + '</span>';
        if (!trailOn) trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
        trailToggleBtn.addEventListener('click', () => {
            window.__setMouseTrail(!trailOn);
        });
    }

    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h);
        composer.setSize(w * renderer.getPixelRatio(), h * renderer.getPixelRatio());
        bloomPass.resolution.set(w * renderer.getPixelRatio(), h * renderer.getPixelRatio());
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    });

    updateFaceInfo(0);
    animate(performance.now());
    </script>

    <!-- CloudBase 初始化 + 手机号登录 -->
    <script>
    (function() {
        // ① 检查 SDK
        if (typeof cloudbase === 'undefined') {
            console.error('[CloudBase] ❌ SDK 未加载');
            var btn = document.getElementById('loginBtn');
            if (btn) { btn.textContent = 'SDK 加载失败'; btn.style.color = '#e55'; }
            return;
        }
        console.log('[CloudBase] ✅ SDK 已加载');

        // ② 初始化
        var app;
        var auth;
        try {
            app = cloudbase.init({
                env: "ew-prod-d0gciqy00757cc7dc",
                region: "ap-shanghai"
            });
            auth = app.auth({ persistence: "local" });
            console.log('[CloudBase] ✅ 已初始化');
        } catch(e) {
            console.error('[CloudBase] ❌ 初始化失败:', e);
            return;
        }

        // ───── DOM 元素 ─────
        var loginBtn       = document.getElementById('loginBtn');
        var loginOverlay   = document.getElementById('loginOverlay');
        var loginBackdrop  = document.getElementById('loginBackdrop');
        var loginClose     = document.getElementById('loginClose');
        var phoneInput     = document.getElementById('phoneInput');
        var sendCodeBtn    = document.getElementById('sendCodeBtn');
        var codeInput      = document.getElementById('codeInput');
        var confirmBtn     = document.getElementById('confirmLoginBtn');
        var loginError     = document.getElementById('loginError');

        var verificationInfo = null; // 存验证信息
        var countdownTimer   = null;

        // ───── 辅助函数 ─────
        function unwrap(result) {
            if (result && result.data !== undefined) return result.data;
            return result;
        }
        function showError(msg) { if (loginError) loginError.textContent = msg; }
        function clearError()   { if (loginError) loginError.textContent = ''; }

        function updateUI(user) {
            if (user) {
                var phone = user.username || user.phone || '';
                loginBtn.textContent = '余烬行者';
                loginBtn.classList.add('logged-in');
                loginBtn.title = phone ? '已登录: ' + phone : '已登录';
            } else {
                loginBtn.textContent = '进入余烬';
                loginBtn.classList.remove('logged-in');
                loginBtn.title = '';
            }
        }

        // ───── 弹窗控制 ─────
        function openModal() {
            if (!loginOverlay) return;
            loginOverlay.classList.add('show');
            if (phoneInput) phoneInput.value = '';
            if (codeInput) codeInput.value = '';
            clearError();
            verificationInfo = null;
            if (phoneInput) phoneInput.focus();
        }
        function closeModal() {
            if (!loginOverlay) return;
            loginOverlay.classList.remove('show');
            clearCountdown();
        }

        // ───── 60 秒倒计时 ─────
        function startCountdown() {
            var sec = 60;
            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = sec + ' 秒后重发';
            countdownTimer = setInterval(function() {
                sec--;
                if (sec <= 0) {
                    clearCountdown();
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '重新获取验证码';
                } else {
                    sendCodeBtn.textContent = sec + ' 秒后重发';
                }
            }, 1000);
        }
        function clearCountdown() {
            if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
            sendCodeBtn.disabled = false;
            sendCodeBtn.textContent = '获取验证码';
        }

        // ───── 发送验证码 ─────
        sendCodeBtn.addEventListener('click', function() {
            clearError();
            var phone = (phoneInput.value || '').trim();
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                showError('请输入正确的手机号');
                return;
            }
            var fullPhone = '+86 ' + phone;
            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '发送中...';

            auth.getVerification({ phone_number: fullPhone })
                .then(function(res) {
                    verificationInfo = unwrap(res);
                    console.log('[CloudBase] 验证码已发送');
                    showError(''); // 不显示错误，但清空
                    startCountdown();
                })
                .catch(function(err) {
                    console.error('[CloudBase] 发送验证码失败:', err);
                    showError('发送失败: ' + (err.message || err.msg || '请检查手机号'));
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '获取验证码';
                });
        });

        // ───── 登录 ─────
        confirmBtn.addEventListener('click', function() {
            clearError();
            if (!verificationInfo) {
                showError('请先获取验证码');
                return;
            }
            var code = (codeInput.value || '').trim();
            if (!code || code.length < 4) {
                showError('请输入验证码');
                return;
            }
            var phone = (phoneInput.value || '').trim();
            var fullPhone = '+86 ' + phone;

            confirmBtn.disabled = true;
            confirmBtn.textContent = '登录中...';

            auth.signInWithSms({
                verificationInfo: verificationInfo,
                verificationCode: code,
                phoneNum: fullPhone
            })
            .then(function(res) {
                var user = unwrap(res);
                console.log('[CloudBase] 登录成功:', user);
                updateUI({ username: fullPhone });
                closeModal();
            })
            .catch(function(err) {
                console.error('[CloudBase] 登录失败:', err);
                showError('登录失败: ' + (err.message || err.msg || '验证码错误'));
                confirmBtn.disabled = false;
                confirmBtn.textContent = '登录';
            });
        });

        // ───── 弹窗关闭按钮 ─────
        loginClose.addEventListener('click', closeModal);
        loginBackdrop.addEventListener('click', closeModal);

        // ───── 点击导航栏「进入余烬」→ 打开弹窗 ─────
        loginBtn.addEventListener('click', function() {
            // 检查是否已登录
            auth.getLoginState().then(function(result) {
                var loginState = unwrap(result);
                if (loginState && loginState.user) {
                    console.log('[CloudBase] 已登录，无需重复');
                    return;
                }
                openModal();
            }).catch(function() {
                openModal();
            });
        });

        // ───── 页面加载时检查登录态 ─────
        auth.getLoginState().then(function(result) {
            var loginState = unwrap(result);
            if (loginState && loginState.user) {
                updateUI({ username: loginState.user.username || loginState.user.phone || loginState.user.uid });
                console.log('[CloudBase] 已登录:', loginState.user.uid);
            }
        }).catch(function(err) {
            console.warn('[CloudBase] 获取登录态失败:', err.message || err);
        });

    })();
    </script>
