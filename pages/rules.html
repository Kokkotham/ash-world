<script>
(function(){
    var btn=document.getElementById('navToggle');
    var panel=document.getElementById('navMobile');
    if(btn&&panel){
        btn.addEventListener('click',function(){
            btn.classList.toggle('open');
            panel.classList.toggle('open');
        });
        // Click a link closes the panel
        panel.querySelectorAll('.mobile-link').forEach(function(l){
            l.addEventListener('click',function(){btn.classList.remove('open');panel.classList.remove('open');});
        });
    }
})();
