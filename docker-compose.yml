services:
  mysql:
    image: mysql:8.0
    container_name: embers-world-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-embers_world}
      MYSQL_USER: ${MYSQL_USER:-embers_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-embers_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-embers_root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
