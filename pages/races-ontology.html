<script>
(async function() {
  await AshData.loadAll();
  const container = document.getElementById('race-content');
  if (!AshData.races) {
    container.innerHTML = '<p style="text-align:center;color:var(--ash-danger)">数据加载失败，请检查 data/ 目录</p>';
    return;
  }

  function renderRaceSection(title, races) {
    let html = '<h2 class="section-title">' + title + '</h2><div class="card-grid">';
    races.forEach(race => {
      const links = AshData.resolveLinks('race', race.id);
      let linkedHTML = '';
      if (links.length > 0) {
        linkedHTML = '<div class="linked-section"><strong>关联：</strong>';
        const seen = new Set();
        links.forEach(l => {
          if (!l.target) return;
          const key = l.targetType + '::' + l.target.name;
          if (seen.has(key)) return;
          seen.add(key);
          const href = l.targetType === 'region' ? 'map.html' :
                       l.targetType === 'module' ? 'modules.html' :
                       l.targetType === 'deity' ? 'pantheon.html' : '#';
          linkedHTML += '<span class="tag-link" title="' + l.link + '">' + l.targetType + '：' + l.target.name + '</span>';
        });
        linkedHTML += '</div>';
      }
      html += '<div class="card"><h3>' + race.name + '</h3><p>' + (race.desc || '') + '</p><div class="meta">' + (race.era || '') + (race.culture ? ' | ' + race.culture : '') + '</div>' + linkedHTML + '</div>';
    });
    html += '</div>';
    return html;
  }

  let html = '';
  if (AshData.races.ancient) html += renderRaceSection('古老种族', AshData.races.ancient);
  if (AshData.races.spirit_mixed) html += renderRaceSection('灵魔混血种族（万魔纪诞生）', AshData.races.spirit_mixed);
  if (AshData.races.nature_psionic) html += renderRaceSection('自然灵能种族', AshData.races.nature_psionic);

  if (AshData.races.human_branches) {
    html += '<h2 class="section-title">其他人类分支</h2><div class="scroll-x"><table class="data-table"><thead><tr><th>分支</th><th>文化原型</th><th>位置</th><th>特征</th></tr></thead><tbody>';
    AshData.races.human_branches.forEach(h => {
      html += '<tr><td>' + h.name + '</td><td>' + h.prototype + '</td><td>' + h.region + '</td><td>' + h.features + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // 新增：玩家种族区块
  if (AshData.races.players && AshData.races.players.length) {
    var attrNames = [
      { key: 'strength', label: '躯魄' },
      { key: 'agility', label: '敏韧' },
      { key: 'constitution', label: '体质' },
      { key: 'intelligence', label: '心智' },
      { key: 'wisdom', label: '洞识' },
      { key: 'charisma', label: '魅力' }
    ];
    html += '<h2 class="section-title">玩家种族（EW 规则书提取）</h2><div class="card-grid">';
    AshData.races.players.forEach(function(player) {
      var vsTag = '';
      if (player.version_status) {
        var vsClass = player.version_status === '新' ? 'tag-new' : 'tag-modified';
        vsTag = ' <span class="' + vsClass + '" style="font-size:0.7rem;padding:1px 6px;border-radius:8px;vertical-align:middle;margin-left:6px">' + player.version_status + '</span>';
      }
      html += '<div class="card"><h3>' + player.name + vsTag + '</h3>';
      // 属性修正条形图
      html += '<div class="attr-bars">';
      var mods = player.attribute_mods || {};
      attrNames.forEach(function(a) {
        var val = mods[a.key] || 0;
        var barColor = val > 0 ? 'var(--ash-gold)' : val < 0 ? 'var(--ash-danger)' : '#555';
        var barWidth = Math.abs(val) * 20;
        html += '<div class="attr-bar-row">';
        html += '<span class="attr-bar-label">' + a.label + '</span>';
        html += '<span class="attr-bar-fill" style="width:' + barWidth + 'px;background:' + barColor + '"></span>';
        html += '<span class="attr-bar-val" style="color:' + (val >= 0 ? 'var(--ash-gold)' : 'var(--ash-danger)') + '">' + (val >= 0 ? '+' : '') + val + '</span>';
        html += '</div>';
      });
      html += '</div>';
      // 描述（仅取前2段）
      if (player.desc && player.desc.length) {
        html += '<p style="font-size:0.85rem;color:var(--ash-gold-dim)">' + player.desc.slice(0, 2).join(' ') + '</p>';
      }
      // 特质列表（前4个）
      if (player.traits && player.traits.length) {
        html += '<div class="player-traits"><strong style="font-size:0.8rem;color:var(--ash-gold)">种族特质：</strong><ul>';
        var shownTraits = player.traits.slice(0, 4);
        shownTraits.forEach(function(t) {
          html += '<li><strong>' + t.name + '</strong>：' + t.desc.substring(0, 80) + (t.desc.length > 80 ? '...' : '') + '</li>';
        });
        if (player.traits.length > 4) {
          html += '<li style="list-style:none;color:var(--ash-gold)">...还有 ' + (player.traits.length - 4) + ' 个特质</li>';
        }
        html += '</ul></div>';
      }
      // 玩法提示
      if (player.gameplay_notes) {
        html += '<div class="meta" style="margin-top:6px">' + player.gameplay_notes + '</div>';
      }
      // 关键词标签
      if (player.related_keywords && player.related_keywords.length) {
        html += '<div class="region-tags" style="margin-top:6px">';
        player.related_keywords.forEach(function(kw) {
          html += '<span class="tag">' + kw + '</span>';
        });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  container.innerHTML = html;
})();
</script>
